<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CodeLens AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      color: black;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    .function-box {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .loading {
      color: #facc15;
    }

    pre {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>CodeLens AI</h1>

  <!-- GitHub Section -->
  <div class="card">
    <h3>Analyze GitHub Repository</h3>

    <input id="repoUrl" placeholder="https://github.com/owner/repo" />

    <select id="mode">
      <option value="beginner">Beginner</option>
      <option value="advanced">Advanced</option>
    </select>

    <button onclick="analyzeRepo()">Analyze Repo</button>
  </div>

  <!-- Code Section -->
  <div class="card">
    <h3>Analyze Code</h3>

    <textarea id="code" placeholder="Paste your Python code here..."></textarea>

    <input id="filename" placeholder="filename.py" />

    <button onclick="analyzeCode()">Analyze Code</button>
  </div>

  <!-- Results -->
  <div id="result" class="card" style="display:none;"></div>
</div>

<script>
const API_URL = ""; // IMPORTANT: empty because same backend serves frontend

// Analyze Code
async function analyzeCode() {
  const code = document.getElementById("code").value.trim();
  const filename = document.getElementById("filename").value.trim() || "snippet.py";
  const mode = document.getElementById("mode").value;

  if (!code) {
    alert("Please enter code");
    return;
  }

  showLoading("Analyzing code...");

  try {
    const res = await fetch(`${API_URL}/api/analyze/code`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code, filename, mode })
    });

    const data = await res.json();
    renderResult(data);

  } catch (err) {
    showError("Failed to connect to backend");
  }
}

// Analyze GitHub Repo
async function analyzeRepo() {
  const url = document.getElementById("repoUrl").value.trim();
  const mode = document.getElementById("mode").value;

  if (!url) {
    alert("Enter GitHub repo URL");
    return;
  }

  showLoading("Analyzing repository...");

  try {
    const res = await fetch(`${API_URL}/api/analyze/github`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url, mode })
    });

    const data = await res.json();
    renderResult(data);

  } catch (err) {
    const text = await res.text();
showError(text);
  }
}

// UI Helpers
function showLoading(text) {
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";
  resultDiv.innerHTML = `<p class="loading">${text}</p>`;
}

function showError(msg) {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `<p style="color:red;">${msg}</p>`;
}

// Render Results
function renderResult(data) {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  if (!data.files || data.files.length === 0) {
    resultDiv.innerHTML = "<p>No Python files found.</p>";
    return;
  }

  data.files.forEach(file => {
    let html = `
      <h2>${file.file}</h2>

      <h3>📌 Summary</h3>
      <p>${file.analysis.summary}</p>

      <h3>⚙️ Functions</h3>
    `;

    file.analysis.functions.forEach(fn => {
      html += `
        <div class="function-box">
          <b>${fn.name}</b><br>
          ${fn.purpose}
          <ul>
            ${fn.steps.map(s => `<li>${s}</li>`).join("")}
          </ul>
        </div>
      `;
    });

    html += `
      <h3>⚠️ Issues</h3>
      <ul>
        ${file.analysis.issues.map(i => `<li>${i}</li>`).join("")}
      </ul>

      <h3>🧠 AST</h3>
      <pre>${JSON.stringify(file.ast, null, 2)}</pre>

      <hr>
    `;

    resultDiv.innerHTML += html;
  });
}
</script>

</body>
</html>
